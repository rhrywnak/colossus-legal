server {
    listen 5473;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: try the exact file first, then fall back to index.html
    # This is what makes React Router work with nginx.
    # Without this, navigating directly to /documents/123 returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (JS, CSS, images have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html or config.js (they change per deployment)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /config.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
