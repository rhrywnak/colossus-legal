# discovery_response.yaml
# Processing profile for interrogatory and request for admission
# responses. Uses chunked extraction because discovery documents
# can be lengthy and contain many independent question/answer pairs.

name: discovery_response
display_name: Discovery Response
description: Interrogatory or request for admission responses.

schema_file: discovery_response_v4.yaml

template_file: pass1_discovery_response_v4.md
global_rules_file: global_rules_v4.md
pass2_template_file: pass2_discovery_response_v4.md
system_prompt_file: legal_extraction_system.md

extraction_model: claude-sonnet-4-6

chunking_mode: full
chunk_size: 8000
chunk_overlap: 500

max_tokens: 32000
temperature: 0.0

auto_approve_grounded: true
run_pass2: true

is_default: false
