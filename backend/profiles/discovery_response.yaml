# Processing profile for the evidence-anchoring pipeline — Discovery Response (v5.1)
#
# Sworn interrogatory responses and requests for admission.
# Each Q&A pair is a sworn statement by the responding party.
# Admissions are binding. Evasive responses are evidence of concealment.
#
# v5.1: schema, pass1, and pass2 templates all at v5.1.
# Structured chunking with qa_pair strategy for scanned documents.
# Cross-document context required for CORROBORATES relationships.

name: discovery_response
display_name: "Discovery Response (v5.1)"
document_type: discovery_response
description: >
  Sworn interrogatory responses and requests for admission —
  evidence-anchoring pipeline. Each Q&A pair becomes a sworn Evidence entity.

schema_file: discovery_response_schema_v5_1.yaml

template_file: discovery_response_pass1_v5_1.md
global_rules_file: global_rules_v4.md
pass2_template_file: discovery_response_pass2_v5_2.md
system_prompt_file: legal_extraction_system.md

extraction_model: claude-opus-4-6
pass2_extraction_model: claude-opus-4-6

chunking_mode: structured
chunk_size: 8000
chunk_overlap: 500

max_tokens: 32000
temperature: 0.0

auto_approve_grounded: true
run_pass2: true

is_default: true

chunking_config:
  mode: structured
  strategy: qa_pair
  units_per_chunk: 10
  unit_overlap: 1
  request_timeout_secs: 1800

pipeline_type: evidence_anchoring
