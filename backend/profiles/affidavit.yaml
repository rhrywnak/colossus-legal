# affidavit.yaml
# Processing profile for sworn statements by witnesses.
# Uses chunked extraction for longer affidavits.

name: affidavit
display_name: Affidavit
description: Sworn statement by a witness.

schema_file: affidavit.yaml

template_file: chunk_extract.md
system_prompt_file: null

extraction_model: claude-sonnet-4-6
synthesis_model: null

chunking_mode: chunked
chunk_size: 8000
chunk_overlap: 500

max_tokens: 8000
temperature: 0.0

auto_approve_grounded: true
run_pass2: false

is_default: false
