# default.yaml
# Fallback profile for document types without a specific profile.
# Uses chunked extraction with generic template.

name: default
display_name: Default
description: Fallback profile for document types without a specific profile.

schema_file: complaint_v4.yaml

template_file: pass1_complaint_v4.md
global_rules_file: global_rules_v4.md
pass2_template_file: pass2_universal_v4.md
system_prompt_file: legal_extraction_system.md

extraction_model: claude-sonnet-4-6
synthesis_model: null

chunking_mode: full
chunk_size: 8000
chunk_overlap: 500

max_tokens: 32000
temperature: 0.0

auto_approve_grounded: true
run_pass2: true

is_default: true
