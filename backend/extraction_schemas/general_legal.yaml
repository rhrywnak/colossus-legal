document_type: general_legal
description: "Universal schema for all legal document types — extracts parties, statements (sworn and unsworn), legal citations, court orders, and cross-document references"

entity_types:
  - name: Party
    description: "A person or organization mentioned in the document. Extract every named individual and organization, including those appearing only once."
    properties:
      - name: full_name
        type: string
        required: true
        description: "Full name as it appears in the document"
      - name: role
        type: string
        required: true
        description: "Role in the case: plaintiff, defendant, appellant, appellee, witness, attorney, judge, guardian, personal_representative, conservator, caregiver, expert_witness, third_party"
      - name: entity_kind
        type: string
        required: true
        description: "person or organization"
      - name: aliases
        type: string
        description: "Other names or references used for this party, comma-separated"

  - name: Statement
    description: "Any factual assertion, legal argument, sworn testimony, or claim. Extract EVERY substantive statement with a verbatim quote."
    properties:
      - name: content
        type: string
        required: true
        description: "Verbatim quote from the document — must be an exact substring of the document text"
      - name: speaker
        type: string
        required: true
        description: "Full name of who made this statement. Identify implied speakers by name."
      - name: sworn
        type: boolean
        required: true
        description: "true if under oath (affidavit, deposition, interrogatory response), false if unsworn (motion, brief)"
      - name: statement_type
        type: string
        required: true
        description: "One of: factual_assertion, legal_argument, sworn_testimony, court_finding, admission, denial, allegation, characterization, order"
      - name: context
        type: string
        description: "Brief description of context, e.g. 'In response to Interrogatory #5'"
      - name: page_number
        type: integer
        required: true
        description: "Page number where this statement appears"
      - name: paragraph_ref
        type: string
        description: "Paragraph, section, or interrogatory number if present"

  - name: LegalCitation
    description: "A reference to a statute, case law, court rule, or other legal authority cited in the document."
    properties:
      - name: citation_text
        type: string
        required: true
        description: "The full citation as written, e.g. 'MCL 700.5306'"
      - name: citation_type
        type: string
        required: true
        description: "One of: statute, case_law, court_rule, regulation, constitutional"
      - name: context
        type: string
        description: "How this citation is used — what legal point it supports"
      - name: page_number
        type: integer
        required: true
        description: "Page number where this citation appears"

  - name: CourtOrder
    description: "A directive or ruling issued by a court. Extract from rulings and when other documents reference prior orders."
    properties:
      - name: issuing_court
        type: string
        required: true
        description: "Name of the court, e.g. 'Oakland County Probate Court'"
      - name: judge
        type: string
        description: "Name of the judge if identified"
      - name: order_date
        type: string
        description: "Date of the order as written in the document"
      - name: content
        type: string
        required: true
        description: "Verbatim text of the order or ruling"
      - name: case_number
        type: string
        description: "Case number if stated"
      - name: page_number
        type: integer
        required: true
        description: "Page number where this order appears or is referenced"

  - name: DocumentReference
    description: "A reference to another document in the case — when the current document cites or quotes another filing or exhibit."
    properties:
      - name: referenced_title
        type: string
        required: true
        description: "Title or description of the referenced document"
      - name: referenced_type
        type: string
        description: "Type if identifiable: complaint, motion, affidavit, exhibit, court_order, brief, interrogatory, deposition"
      - name: exhibit_number
        type: string
        description: "Exhibit label if applicable, e.g. 'Exhibit A'"
      - name: context
        type: string
        description: "Why this document is being referenced"
      - name: page_number
        type: integer
        required: true
        description: "Page number where this reference appears"

relationship_types:
  - name: STATED_BY
    description: "Links a Statement to the Party who made it. Every Statement must have exactly one STATED_BY."
  - name: CONCERNS
    description: "Links a Statement to the Party it is about — when a statement describes, accuses, or discusses a specific party."
  - name: CONTRADICTS
    description: "Links two Statements by the SAME speaker that conflict. Both must share the same STATED_BY party."
  - name: REBUTS
    description: "Links a Statement by one speaker that directly counters a Statement by a different speaker."
  - name: CITES
    description: "Links a Statement to a LegalCitation it references as authority."
  - name: ORDERS
    description: "Links a CourtOrder to the Party it directs or affects."
  - name: REFERENCES
    description: "Links any entity to a DocumentReference when it cites another document."

valid_patterns:
  - from: Statement
    relationship: STATED_BY
    to: Party
  - from: Statement
    relationship: CONCERNS
    to: Party
  - from: Statement
    relationship: CONTRADICTS
    to: Statement
  - from: Statement
    relationship: REBUTS
    to: Statement
  - from: Statement
    relationship: CITES
    to: LegalCitation
  - from: CourtOrder
    relationship: ORDERS
    to: Party
  - from: Statement
    relationship: REFERENCES
    to: DocumentReference
  - from: CourtOrder
    relationship: REFERENCES
    to: DocumentReference
  - from: LegalCitation
    relationship: REFERENCES
    to: DocumentReference

extraction_rules:
  - "Extract EVERY substantive statement — litigation requires exhaustive extraction, not sampling"
  - "Every verbatim_quote must be an exact substring of the document text — do not paraphrase"
  - "Always identify the speaker by name, even when implied (e.g., 'Respondent argues...' → name the respondent)"
  - "Mark sworn=true for affidavits, depositions, interrogatory responses; sworn=false for motions, briefs"
  - "For court findings, use statement_type 'court_finding' and sworn=false"
  - "When two statements by the SAME speaker in this document conflict, create a CONTRADICTS relationship"
  - "When the document references another filing or exhibit, create a DocumentReference entity"
  - "For court rulings, extract both the order (CourtOrder) and reasoning (Statement with type court_finding)"
  - "Include paragraph numbers, section headers, interrogatory numbers in paragraph_ref when present"
  - "Extract ALL named parties including those appearing only once — capture every alias"
