document_type: complaint
version: "2.0"
document_category: foundation
description: "Legal complaint — foundation document defining the structural skeleton of the case. All other documents produce evidence that connects to the entities extracted here."

entity_types:
  - name: Party
    category: foundation
    required: true
    min_count: 2
    grounding_mode: name_match
    description: "A person or organization named as a party in the case. Extract every plaintiff, defendant, and third-party named in the complaint. Use their full legal name exactly as it appears in the document."
    properties:
      - name: full_name
        type: string
        required: true
        description: "Full legal name as written in the document (e.g. 'MARIE AWAD', 'CATHOLIC FAMILY SERVICES')"
      - name: role
        type: string
        required: true
        description: "Role in the case: plaintiff, defendant, or third_party"
      - name: entity_kind
        type: string
        required: true
        description: "Either 'person' or 'organization'"

  - name: LegalCount
    category: foundation
    required: true
    min_count: 1
    grounding_mode: heading_match
    description: "A cause of action (count) asserted in the complaint. Complaints organize legal theories as numbered counts. Extract every count. The label should be the count heading as it appears in the document."
    properties:
      - name: count_number
        type: integer
        required: true
        description: "The count number (I=1, II=2, III=3, IV=4, etc.)"
      - name: legal_basis
        type: string
        required: true
        description: "The legal theory (e.g. 'Breach of Fiduciary Duty', 'Fraud')"
      - name: description
        type: string
        description: "Brief description of what this count alleges"
      - name: paragraph_range
        type: string
        description: "Complaint paragraph range for this count (e.g. '86-100')"

  - name: ComplaintAllegation
    category: structural
    required: true
    min_count: 1
    grounding_mode: verbatim
    description: "A specific factual allegation made in the complaint. Each numbered paragraph that makes a factual claim is a separate allegation. Extract every numbered paragraph individually — do not group multiple paragraphs into one allegation."
    properties:
      - name: paragraph_number
        type: string
        required: true
        description: "The paragraph number as written in the complaint (e.g. '12', '47')"
      - name: summary
        type: string
        required: true
        description: "One-sentence summary of what the paragraph alleges"
      - name: verbatim_quote
        type: string
        required: true
        description: "Exact text copied from the complaint. Must be an exact substring of the document — do not paraphrase, do not add or remove words."

  - name: Harm
    category: structural
    required: false
    grounding_mode: derived
    provenance_required: true
    description: "A specific damage or harm claimed by the plaintiff. Harms are derived from multiple allegations — they are not direct quotes. For each harm, you MUST provide provenance linking it to the specific complaint paragraphs that establish it."
    properties:
      - name: harm_type
        type: string
        required: true
        description: "Category: financial, emotional, procedural, reputational, or physical"
      - name: description
        type: string
        required: true
        description: "Description of the harm"
      - name: amount
        type: string
        description: "Dollar amount if specified in the complaint"

relationship_types:
  - name: SUPPORTS
    description: "This allegation supports (provides factual basis for) this legal count"
  - name: STATED_BY
    description: "This allegation was made by this party (typically the plaintiff)"
  - name: ABOUT
    description: "This allegation concerns or is directed at this party"
  - name: DERIVED_FROM
    description: "This harm is derived from (established by) this allegation"
  - name: CONTAINED_IN
    description: "This entity appears in this document"
  - name: FILED_BY
    description: "This complaint was filed by this party"
  - name: FILED_AGAINST
    description: "This complaint was filed against this party"

valid_patterns:
  - from: ComplaintAllegation
    relationship: SUPPORTS
    to: LegalCount
  - from: ComplaintAllegation
    relationship: STATED_BY
    to: Party
  - from: ComplaintAllegation
    relationship: ABOUT
    to: Party
  - from: Harm
    relationship: DERIVED_FROM
    to: ComplaintAllegation
  - from: Harm
    relationship: SUPPORTS
    to: LegalCount
  - from: Party
    relationship: FILED_BY
    to: Party
  - from: Party
    relationship: FILED_AGAINST
    to: Party

completeness_rules:
  - type: entity_count
    entity: Party
    min: 2
    message: "Expected at least one plaintiff and one defendant"
  - type: entity_count
    entity: LegalCount
    min: 1
    message: "No legal counts found — every complaint has at least one cause of action"
  - type: entity_count
    entity: ComplaintAllegation
    min: 5
    message: "Fewer than 5 allegations found — complaint likely under-extracted"
  - type: relationship_exists
    from: ComplaintAllegation
    relationship: SUPPORTS
    to: LegalCount
    min_percentage: 50
    message: "Less than 50% of allegations link to a legal count"

extraction_rules:
  - "Every verbatim_quote MUST be an exact substring of the document text. Copy the text character-for-character. Do not paraphrase, abbreviate, or clean up the text."
  - "Extract EVERY numbered paragraph as a separate ComplaintAllegation. Do not skip paragraphs. Do not merge multiple paragraphs into one allegation."
  - "Extract ALL parties — plaintiffs, defendants, and any third parties named in the complaint."
  - "Extract ALL legal counts (causes of action). Look for headings like 'COUNT I', 'FIRST CAUSE OF ACTION', 'COUNT II', or similar section headers."
  - "Link every ComplaintAllegation to the LegalCount it supports via a SUPPORTS relationship. An allegation may support multiple counts."
  - "Link every ComplaintAllegation to the Party it is ABOUT (the party whose actions are described)."
  - "For Harm entities, provide a 'provenance' array listing the paragraph numbers and short quote snippets that establish the harm."
  - "Each entity must have a unique 'id' field using the pattern: party-001, count-001, allegation-001, harm-001, etc."
  - "Output MUST be valid JSON with no markdown fences, no code blocks, no backticks, no explanation."
