document_type: discovery_response
description: "Sworn responses to interrogatories or discovery requests"

entity_types:
  - name: Party
    description: "A person or organization mentioned in the discovery response"
    properties:
      - name: role
        type: string
        required: true
        description: "Role in the case (respondent, plaintiff, witness, attorney, third_party)"
      - name: full_name
        type: string
        required: true
        description: "Full legal name as it appears in the document"
      - name: entity_kind
        type: string
        description: "person or organization"

  - name: InterrogatoryAnswer
    description: "A specific answer to an interrogatory question, given under oath"
    properties:
      - name: interrogatory_number
        type: string
        required: true
        description: "The interrogatory number or identifier (e.g. '1', '2a', 'Q89')"
      - name: question_summary
        type: string
        required: true
        description: "Brief summary of what was asked"
      - name: answer_summary
        type: string
        required: true
        description: "Brief summary of the sworn answer"

  - name: DocumentReference
    description: "A document, exhibit, or record referenced in the discovery response"
    properties:
      - name: reference_id
        type: string
        required: true
        description: "How the document is identified (e.g. 'Exhibit A', 'attached records')"
      - name: description
        type: string
        description: "Brief description of what the referenced document contains"

  - name: Admission
    description: "A fact explicitly admitted or acknowledged by the responding party"
    properties:
      - name: admission_text
        type: string
        required: true
        description: "Summary of what was admitted"

  - name: Denial
    description: "A fact explicitly denied by the responding party"
    properties:
      - name: denial_text
        type: string
        required: true
        description: "Summary of what was denied"

  - name: Objection
    description: "A legal objection raised in response to a discovery request"
    properties:
      - name: objection_basis
        type: string
        required: true
        description: "The legal basis for the objection (e.g. privilege, relevance, scope)"

relationship_types:
  - name: ANSWERED_BY
    description: "Links an interrogatory answer to the party who gave it"
  - name: CONCERNS
    description: "Links an answer, admission, or denial to the party it concerns"
  - name: CITES
    description: "Links an answer to a document it references"
  - name: CONTAINS_ADMISSION
    description: "Links an interrogatory answer to an admission within it"
  - name: CONTAINS_DENIAL
    description: "Links an interrogatory answer to a denial within it"
  - name: OBJECTED_TO
    description: "Links an objection to the interrogatory it objects to"

valid_patterns:
  - from: InterrogatoryAnswer
    relationship: ANSWERED_BY
    to: Party
  - from: InterrogatoryAnswer
    relationship: CONCERNS
    to: Party
  - from: InterrogatoryAnswer
    relationship: CITES
    to: DocumentReference
  - from: InterrogatoryAnswer
    relationship: CONTAINS_ADMISSION
    to: Admission
  - from: InterrogatoryAnswer
    relationship: CONTAINS_DENIAL
    to: Denial
  - from: Objection
    relationship: OBJECTED_TO
    to: InterrogatoryAnswer
  - from: Admission
    relationship: CONCERNS
    to: Party
  - from: Denial
    relationship: CONCERNS
    to: Party

extraction_rules:
  - "Every verbatim_quote must be an exact substring of the document text"
  - "Identify all parties by their full legal name and role"
  - "Extract EVERY interrogatory answer — do not skip or summarize"
  - "Distinguish between admissions (facts acknowledged) and denials (facts contested)"
  - "Include the interrogatory number for every answer"
  - "When an answer references another document or exhibit, create a DocumentReference"
  - "If the respondent objects rather than answers, extract the Objection with its legal basis"
