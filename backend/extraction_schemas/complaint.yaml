document_type: complaint
description: "Initial complaint filed by plaintiff"

entity_types:
  - name: Party
    description: "A person or organization involved in the case"
    properties:
      - name: party_name
        type: string
        required: true
      - name: role
        type: string
        description: "plaintiff, defendant, third_party, witness, attorney, etc."
      - name: party_type
        type: string
        description: "individual or organization"

  - name: ComplaintAllegation
    description: "A specific factual claim made in the complaint"
    properties:
      - name: allegation_text
        type: string
        required: true
        description: "Brief summary of the allegation"
      - name: verbatim_quote
        type: string
        required: true
        description: "Exact text from the document — must be a substring of the document text"
      - name: paragraph_ref
        type: string
        description: "Paragraph reference if numbered (e.g. paragraph 12)"

  - name: LegalCount
    description: "A legal cause of action (count) in the complaint"
    properties:
      - name: count_name
        type: string
        required: true
      - name: count_number
        type: integer
      - name: legal_basis
        type: string
        description: "Legal statute or common law basis"

  - name: Harm
    description: "A specific claim for damages or relief"
    properties:
      - name: claim_text
        type: string
        required: true
      - name: amount
        type: string
        description: "Dollar amount if specified"
      - name: damages_type
        type: string
        description: "compensatory, punitive, equitable, etc."
      - name: harm_type
        type: string
        description: "Type of harm: financial, reputational, emotional, procedural"
      - name: description
        type: string
        description: "Brief description of the harm"

relationship_types:
  - name: STATED_BY
    description: "Who made or is attributed this statement"
  - name: ABOUT
    description: "Who or what this statement concerns"
  - name: SUPPORTS
    description: "This allegation or claim supports this legal count"
  - name: CONTAINED_IN
    description: "This entity is found in this document"

valid_patterns:
  - from: ComplaintAllegation
    relationship: STATED_BY
    to: Party
  - from: ComplaintAllegation
    relationship: ABOUT
    to: Party
  - from: ComplaintAllegation
    relationship: SUPPORTS
    to: LegalCount
  - from: Harm
    relationship: SUPPORTS
    to: LegalCount

extraction_rules:
  - "Every verbatim_quote MUST be an exact substring of the document text. Copy the text exactly."
  - "Do NOT paraphrase or summarize in verbatim_quote fields — use the document's actual words."
  - "Include paragraph references where the document uses numbered paragraphs."
  - "Extract ALL parties mentioned, including attorneys, judges, and non-party witnesses."
  - "Extract EVERY factual allegation individually — do not group multiple facts into one."
  - "Output MUST be valid JSON with no markdown fences, no code blocks, no backticks."
  - "Each entity must have a unique id field (e.g. party-001, allegation-001, count-001)."
  - "For LegalCount entities, the label MUST be the name of the cause of action (e.g., 'Breach of Fiduciary Duty', 'Fraud', 'Abuse of Process'), NOT 'Count I' or a number."
  - "Use the FULL name of each party consistently throughout. Do NOT create separate entities for abbreviations or short forms. For example, if the document refers to 'George Phillips' and 'Phillips', create ONE Party entity with label 'George Phillips'. Do NOT create a second entity for 'Phillips'."
  - "Do NOT extract generic references as Party entities. Words like 'Plaintiff', 'Defendants', 'the Court', 'Petitioner', or 'Respondent' are roles, not party names. Only extract named individuals and named organizations."
  - "Every ComplaintAllegation that is part of a numbered cause of action (Count) MUST have a SUPPORTS relationship to the corresponding LegalCount entity."
  - "For Harm entities, extract the specific damages amount if stated in the document. Set the label to a brief description of the harm (e.g., 'Loss of $50,000 estate funds', 'Attorney fees of $7,500')."
