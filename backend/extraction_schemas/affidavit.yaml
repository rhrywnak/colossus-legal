document_type: affidavit
description: "Sworn statement by an individual, organized as numbered paragraphs of sworn facts"

entity_types:
  - name: Party
    description: "A person or organization mentioned in the affidavit"
    properties:
      - name: role
        type: string
        required: true
        description: "Role (affiant, witness, plaintiff, defendant, attorney, third_party)"
      - name: full_name
        type: string
        required: true
        description: "Full legal name as it appears in the document"
      - name: entity_kind
        type: string
        description: "person or organization"

  - name: SwornStatement
    description: "A specific factual statement made under oath in the affidavit"
    properties:
      - name: paragraph_number
        type: string
        description: "Paragraph number in the affidavit"
      - name: statement_summary
        type: string
        required: true
        description: "Summary of the sworn statement"

  - name: DocumentReference
    description: "A document, exhibit, or record referenced in the affidavit"
    properties:
      - name: reference_id
        type: string
        required: true
        description: "How the document is identified"
      - name: description
        type: string
        description: "Brief description of what the referenced document"

relationship_types:
  - name: SWORN_BY
    description: "Links a statement to the person who swore it"
  - name: CONCERNS
    description: "Links a sworn statement to the party it is about"
  - name: CITES
    description: "Links a sworn statement to a document it references"

valid_patterns:
  - from: SwornStatement
    relationship: SWORN_BY
    to: Party
  - from: SwornStatement
    relationship: CONCERNS
    to: Party
  - from: SwornStatement
    relationship: CITES
    to: DocumentReference

extraction_rules:
  - "Every verbatim_quote must be an exact substring of the document text"
  - "Identify all parties by their full legal name and role"
  - "Extract EVERY numbered paragraph as a separate SwornStatement"
  - "Include paragraph numbers for every statement"
  - "The affiant's name and role should be extracted as the first Party entity"
  - "When a statement references dates, amounts, or specific events, preserve those details in the summary"
